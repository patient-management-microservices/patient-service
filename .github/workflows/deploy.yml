name: Deploy Patient Service

on:
  workflow_run:
    workflows: ["Build and Publish Docker Image"]
    types:
      - completed

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    runs-on: self-hosted

    steps:
      - name: Deploy Patient Service
        run: |
          cd /home/dilshanjay/Apps/patient-management/patient-management-devops

          echo "Updating DevOps repository..."
          git fetch origin
          git reset --hard origin/main

          echo "Pulling latest patient-service image..."
          docker compose pull patient-service

          echo "Restarting patient-service..."
          docker compose up -d patient-service

          echo "Deployment completed!"